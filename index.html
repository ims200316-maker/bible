<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- 인터넷 창 탭 이름 변경 -->
    <title>임원 암송시험 연습</title>
    <!-- 인터넷 창 탭 아이콘(파비콘) 적용 -->
    <link rel="icon" type="image/png" href="생명의말씀선교회CI_심볼 3D.png">
    
    <style>
        /* KoPubWorld 돋움체 웹 폰트 적용 */
        @font-face {
            font-family: 'KoPubWorldDotum';
            font-weight: 400;
            font-style: normal;
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2201-2@1.0/KoPubWorldDotum.woff') format('woff');
        }

        :root { --primary: #1a73e8; --secondary: #34a853; --accent: #fbbc05; --bg: #f8f9fa; --burgundy: #800020; }
        
        body { font-family: 'KoPubWorldDotum', 'Malgun Gothic', sans-serif; background-color: var(--bg); margin: 0; padding: 10px; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; -webkit-tap-highlight-color: transparent; }
        
        .container { width: 100%; max-width: 800px; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; margin-bottom: 20px; box-sizing: border-box; }
        
        h1 { color: #000; font-size: 1.8rem; margin-bottom: 20px; word-break: keep-all; line-height: 1.3; } 
        
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .menu-item { text-align: left; }
        label { font-size: 15px; font-weight: bold; color: #555; margin-bottom: 5px; display: block; }
        
        select, button { font-family: 'KoPubWorldDotum', 'Malgun Gothic', sans-serif; padding: 12px; border-radius: 10px; border: 1px solid #ddd; font-size: 17px; cursor: pointer; transition: 0.2s; width: 100%; box-sizing: border-box; -webkit-appearance: none; } 
        
        .btn-contest { background: var(--secondary); color: white; border: none; font-weight: bold; padding: 16px; font-size: 19px; box-shadow: 0 4px 6px rgba(52, 168, 83, 0.2); margin-bottom: 12px; } 
        .btn-book { background: var(--primary); color: white; border: none; padding: 12px; font-weight: bold; }
        .btn-stop { background: #dc3545; color: white; border: none; padding: 12px; font-weight: bold; }
        .btn-gray { background: #5f6368; color: white; border: none; padding: 12px; font-weight: bold; }
        button:active { transform: scale(0.97); opacity: 0.9; }
        
        #question-box { background: #f1f3f4; padding: 20px; border-radius: 15px; margin: 15px 0; border-left: 6px solid var(--primary); text-align: left; }
        .topic-label { color: #d93025; font-weight: bold; font-size: 16px; margin-bottom: 5px; display: block; } 
        #question-text { font-size: 19px; color: #202124; line-height: 1.6; word-break: keep-all; } 
        
        textarea { font-family: 'KoPubWorldDotum', 'Malgun Gothic', sans-serif; width: 100%; height: 120px; border: 2px solid #ddd; border-radius: 12px; padding: 12px; font-size: 19px; resize: none; box-sizing: border-box; outline: none; margin-top: 10px; appearance: none; }
        
        #result { margin-top: 15px; text-align: left; min-height: 80px; font-size: 17px; } 
        .wrong-char { color: #d93025; text-decoration: underline; font-weight: bold; }
        .diff-view { line-height: 1.6; font-size: 18px; background: #fff5f5; padding: 15px; border-radius: 12px; border: 1px solid #ffebeb; word-break: break-all; } 
        
        .book-container { text-align: left; max-height: 65vh; overflow-y: auto; padding-right: 5px; -webkit-overflow-scrolling: touch; }
        .book-month-title { background: var(--primary); color: white; padding: 4px 10px; border-radius: 5px; font-size: 16px; margin-top: 15px; display: inline-block; } 
        .book-item { margin: 8px 0; padding: 10px; border-bottom: 1px solid #eee; font-size: 17px; line-height: 1.5; } 
        .topic-badge { background: #fff3e0; color: #e65100; padding: 2px 6px; border-radius: 4px; font-size: 15px; font-weight: bold; margin-bottom: 4px; display: inline-block; } 
        .quiz-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; }
        .hidden { display: none; }
        
        #quiz-title { font-weight:bold; color:var(--primary); font-size: 17px; margin-bottom:10px; display: flex; justify-content: space-between; align-items: center; } 
        
        /* 결과 통계 화면 스타일 */
        .stats-container { text-align: left; max-height: 60vh; overflow-y: auto; padding-right: 5px; }
        .bar-chart-row { display: flex; align-items: center; margin-bottom: 8px; font-size: 15px; }
        .bar-label { width: 90px; font-weight: bold; color: #333; flex-shrink: 0; }
        .bar-track { flex-grow: 1; background: #eee; height: 16px; border-radius: 8px; overflow: hidden; margin: 0 10px; position: relative; }
        .bar-fill { background: #d93025; height: 100%; border-radius: 8px; width: 0%; transition: width 0.6s ease; }
        .bar-text { width: 45px; text-align: right; font-size: 14px; color: #666; }
        .wrong-review-item { background: #fff5f5; border: 1px solid #ffebeb; padding: 12px; border-radius: 10px; margin-bottom: 10px; font-size: 16px; }
    </style>
</head>
<body>
<div class="container">
    <div id="setup-screen" class="card">
        <h1>임원 암송시험 연습</h1>
        <div class="menu-grid">
            <div class="menu-item">
                <label>📅 기준 월 선택</label>
                <select id="month-select">
                    <option value="1">1월</option><option value="2">2월</option><option value="3">3월</option>
                    <option value="4">4월</option><option value="5">5월</option><option value="6">6월</option>
                    <option value="7">7월</option><option value="8">8월</option><option value="9">9월</option>
                    <option value="10">10월</option><option value="11">11월</option><option value="12">12월</option>
                </select>
            </div>
            <div class="menu-item">
                <label>📝 문제 방식</label>
                <select id="mode-select">
                    <option value="content">장절 보고 내용 쓰기</option>
                    <option value="ref">내용 보고 장절 쓰기</option>
                    <option value="mix">장절/내용 둘다 (랜덤)</option>
                </select>
            </div>
            <div class="menu-item">
                <label>🔄 진행 순서</label>
                <select id="order-select">
                    <option value="sequential">순서대로 (처음부터)</option>
                    <option value="random">무작위 (섞어서)</option>
                </select>
            </div>
        </div>
        <div style="border-top: 1px solid #eee; padding-top: 20px; display: flex; flex-direction: column;">
            <button class="btn-contest" onclick="startQuiz()">연습시작 (당월+익월)</button>
            <button class="btn-book" onclick="showBook()">전체 암송수첩 보기</button>
        </div>
    </div>

    <div id="quiz-screen" class="card hidden">
        <div id="quiz-title">
            <span id="title-text"></span>
            <span id="progress-text" style="font-size:14px; color:#666;"></span>
        </div>
        <div id="question-box">
            <span id="topic-label" class="topic-label"></span>
            <div id="question-text"></div>
        </div>
        <textarea id="userInput" placeholder="정답을 입력하세요..." autocorrect="off" autocapitalize="off" spellcheck="false"></textarea>
        <div class="quiz-btns">
            <button class="btn-gray" onclick="prevQuestion()">이전 암송(F1)</button>
            <button class="btn-gray" onclick="nextQuestion()">다음 암송(F2)</button>
            <button class="btn-book" style="padding:10px;" onclick="checkAnswer()">정답 확인</button>
            <button class="btn-stop" onclick="goBackManually()">그만하기</button>
        </div>
        <div id="result"></div>
    </div>

    <!-- 결과 통계 화면 -->
    <div id="stats-screen" class="card hidden">
        <h2 style="font-size: 1.6rem; color: #000; margin-bottom: 10px;">🎉 한 사이클 완료!</h2>
        <p style="color: #666; margin-bottom: 20px;">이번 사이클 암송 시험 결과 분석입니다.</p>
        
        <div class="stats-container">
            <h3 style="font-size: 1.1rem; color: var(--primary); text-align: left; margin-bottom: 10px;">📊 구절별 오답 횟수 그래프</h3>
            <div id="chart-area" style="margin-bottom: 25px;"></div>
            
            <h3 style="font-size: 1.1rem; color: #d93025; text-align: left; margin-bottom: 10px;">❌ 틀렸던 암송 구절 목록</h3>
            <div id="wrong-list-area"></div>
        </div>

        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button class="btn-contest" id="retry-wrong-btn" onclick="startWrongRetry()" style="margin-bottom: 0; flex: 1;">오답만 모아서 다시 시험</button>
            <button class="btn-gray" onclick="goBackManually()" style="flex: 1;">처음으로</button>
        </div>
    </div>

    <div id="book-screen" class="card hidden">
        <h2 style="font-size: 1.8rem; color: #000;">전체 암송수첩</h2>
        <div class="book-container" id="book-list"></div>
        <button class="btn-gray" onclick="goBackManually()" style="margin-top:20px; width:100%;">돌아가기</button>
    </div>
</div>

<script>
    const bibleData = {
        1: [{topic:"[영생에 대하여]", ref:"(요 5:24)", content:"내가 진실로 진실로 너희에게 이르노니 내 말을 듣고 또 나 보내신 이를 믿는 자는 영생을 얻었고 심판에 이르지 아니하나니 사망에서 생명으로 옮겼느니라"},{topic:"[영생에 대하여]", ref:"(요 6:40)", content:"내 아버지의 뜻은 아들을 보고 믿는 자마다 영생을 얻는 이것이니 마지막 날에 내가 이를 다시 살리리라 하시니라"},{topic:"[영생에 대하여]", ref:"(요 10:28-29)", content:"내가 저희에게 영생을 주노니 영원히 멸망치 아니할 터이요 또 저희를 내 손에서 빼앗을 자가 없느니라 저희를 주신 내 아버지는 만유보다 크시매 아무도 아버지 손에서 빼앗을 수 없느니라"},{topic:"[영생에 대하여]", ref:"(요 11:25-26)", content:"예수께서 가라사대 나는 부활이요 생명이니 나를 믿는 자는 죽어도 살겠고 무릇 살아서 나를 믿는 자는 영원히 죽지 아니하리니 이것을 네가 믿느냐"}],
        2: [{topic:"[영생에 대하여]", ref:"(요 17:3)", content:"영생은 곧 유일하신 참 하나님과 그의 보내신 자 예수 그리스도를 아는 것이니이다"},{topic:"[영생에 대하여]", ref:"(롬 6:23)", content:"죄의 삯은 사망이요 하나님의 은사는 그리스도 예수 우리 주 안에 있는 영생이니라"},{topic:"[영생에 대하여]", ref:"(갈 6:7-8)", content:"스스로 속이지 말라 하나님은 만홀히 여김을 받지 아니하시나니 사람이 무엇으로 심든지 그대로 거두리라 자기의 육체를 위하여 심는 자는 육체로부터 썩어진 것을 거두고 성령을 위하여 심는 자는 성령으로부터 영생을 거두리라"},{topic:"[소망에 대하여]", ref:"(요 14:1-3)", content:"너희는 마음에 근심하지 말라 하나님을 믿으니 또 나를 믿으라 내 아버지 집에 거할 곳이 많도다 그렇지 않으면 너희에게 일렀으리라 내가 너희를 위하여 처소를 예비하러 가노니 가서 너희를 위하여 처소를 예비하면 내가 다시 와서 너희를 내게로 영접하여 나 있는 곳에 너희도 있게 하리라"}],
        3: [{topic:"[소망에 대하여]", ref:"(롬 5:5-6)", content:"소망이 부끄럽게 아니함은 우리에게 주신 성령으로 말미암아 하나님의 사랑이 우리 마음에 부은바 됨이니 우리가 아직 연약할 때에 기약대로 그리스도께서 경건치 않은 자를 위하여 죽으셨도다"},{topic:"[소망에 대하여]", ref:"(롬 8:22-23)", content:"피조물이 다 이제까지 함께 탄식하며 함께 고통하는 것을 우리가 아나니 이뿐 아니라 또한 우리 곧 성령의 처음 익은 열매를 받은 우리까지도 속으로 탄식하여 양자 될것 곧 우리 몸의 구속을 기다리느니라"},{topic:"[소망에 대하여]", ref:"(고전 9:25)", content:"이기기를 다투는 자마다 모든 일에 절제하나니 저희는 썩을 면류관을 얻고자 하되 우리는 썩지 아니할 것을 얻고자 하노라"},{topic:"[소망에 대하여]", ref:"(고후 4:17-18)", content:"우리의 잠시 받는 환난의 경한 것이 지극히 크고 영원한 영광의 중한 것을 우리에게 이루게 함이니 우리의 돌아보는 것은 보이는 것이 아니요 보이지 않는 것이니 보이는 것은 잠간이요 보이지 않는 것은 영원함이니라"},{topic:"[소망에 대하여]", ref:"(벧전 1:3-4)", content:"찬송하리로다 우리 주 예수 그리스도의 아버지 하나님이 그 많으신 긍휼대로 예수 그리스도의 죽은 자 가운데서 부활하심으로 말미암아 우리를 거듭나게 하사 산 소망이 있게 하시며 썩지 않고 더럽지 않고 쇠하지 아니하는 기업을 잇게 하시나니 곧 너희를 위하여 하늘에 간직하신 것이라"}],
        4: [{topic:"[소망에 대하여]", ref:"(벧전 3:15-16)", content:"너희 마음에 그리스도를 주로 삼아 거룩하게 하고 너희 속에 있는 소망에 관한 이유를 묻는 자에게는 대답할 것을 항상 예비하되 온유와 두려움으로 하고 선한 양심을 가지라 이는 그리스도 안에 있는 너희의 선행을 욕하는 자들로 그 비방하는 일에 부끄러움을 당하게 하려 함이라"},{topic:"[소망에 대하여]", ref:"(요일 3:1-3)", content:"보라 아버지께서 어떠한 사랑을 우리에게 주사 하나님의 자녀라 일컬음을 얻게 하셨는고, 우리가 그러하도다 그러므로 세상이 우리를 알지 못함은 그를 알지 못함이니라 사랑하는 자들아 우리가 지금은 하나님의 자녀라 장래에 어떻게 될 것은 아직 나타나지 아니하였으나 그가 나타내심이 되면 우리가 그와 같을 줄을 아는 것은 그의 계신 그대로 볼 것을 인함이니 주를 향하여 이 소망을 가진 자마다 그의 깨끗하심과 같이 자기를 깨끗하게 하느니라"},{topic:"[소망에 대하여]", ref:"(롬 15:4)", content:"무엇이든지 전에 기록한 바는 우리의 교훈을 위하여 기록된 것이니 우리로 하여금 인내로 또는 성경의 안위로 소망을 가지게 함이니라"},{topic:"[소망에 대하여]", ref:"(행 24:15)", content:"저희의 기다리는바 하나님께 향한 소망을 나도 가졌으니 곧 의인과 악인의 부활이 있으리라 함이라"}],
        5: [{topic:"[평안에 대하여]", ref:"(요 14:27)", content:"평안을 너희에게 끼치노니 곧 나의 평안을 너희에게 주노라 내가 너희에게 주는 것은 세상이 주는 것 같지 아니하니라 너희는 마음에 근심도 말고 두려워하지도 말라"},{topic:"[평안에 대하여]", ref:"(마 11:28-30)", content:"수고하고 무거운 짐진 자들아 다 내게로 오라 내가 너희를 쉬게 하리라 나는 마음이 온유하고 겸손하니 나의 멍에를 메고 내게 배우라 그러면 너희 마음이 쉼을 얻으리니 이는 내 멍에는 쉽고 내 짐은 가벼움이라 하시니라"},{topic:"[평안에 대하여]", ref:"(잠 14:12-13)", content:"어떤 길은 사람의 보기에 바르나 필경은 사망의 길이니라 웃을 때에도 마음에 슬픔이 있고 즐거움의 끝에도 근심이 있느니라"},{topic:"[평안에 대하여]", ref:"(시 4:7-8)", content:"주께서 내 마음에 두신 기쁨은 저희의 곡식과 새 포도주의 풍성할 때보다 더하니이다 내가 평안히 눕고 자기도 하리니 나를 안전히 거하게 하시는 이는 오직 여호와시니이다"},{topic:"[평안에 대하여]", ref:"(롬 14:17)", content:"하나님의 나라는 먹는 것과 마시는 것이 아니요 오직 성령 안에서 의와 평강과 희락이라"}],
        6: [{topic:"[평안에 대하여]", ref:"(골 3:15)", content:"그리스도의 평강이 너희 마음을 주장하게 하라 평강을 위하여 너희가 한 몸으로 부르심을 받았나니 또한 너희는 감사하는 자가 되라"},{topic:"[평안에 대하여]", ref:"(시 119:165)", content:"주의 법을 사랑하는 자에게는 큰 평안이 있으니 저희에게 장애물이 없으리이다"},{topic:"[평안에 대하여]", ref:"(전 5:10)", content:"은을 사랑하는 자는 은으로 만족함이 없고 풍부를 사랑하는 자는 소득으로 만족함이 없나니 이것도 헛되도다"},{topic:"[성령에 대하여]", ref:"(마 12:31-32)", content:"그러므로 내가 너희에게 이르노니 사람의 모든 죄와 훼방은 사하심을 얻되 성령을 훼방하는 것은 사하심을 얻지 못하겠고 또 누구든지 말로 인자를 거역하면 사하심을 얻되 누구든지 말로 성령을 거역하면 이 세상과 오는 세상에도 사하심을 얻지 못하리라"}],

        11: [{topic:"[성결에 대하여]", ref:"(엡 5:25-27)", content:"남편들아 아내 사랑하기를 그리스도께서 교회를 사랑하시고 위하여 자신을 주심 같이 하라 이는 곧 물로 씻어 말씀으로 깨끗하게 하사 거룩하게 하시고 자기 앞에 영광스러운 교회로 세우사 티나 주름잡힌 것이나 이런 것들이 없이 거룩하고 흠이 없게 하려 하심이니라"},{topic:"[성결에 대하여]", ref:"(골 3:9)", content:"너희가 서로 거짓말을 말라 옛 사람과 그 행위를 벗어버리고"},{topic:"[성결에 대하여]", ref:"(살전 5:23)", content:"평강의 하나님이 친히 너희로 온전히 거룩하게 하시고 또 너희 온 영과 혼과 몸이 우리 주 예수 그리스도 강림하실 때에 흠없게 보전되기를 원하노라"},{topic:"[성결에 대하여]", ref:"(약 3:17-18)", content:"오직 위로부터 난 지혜는 첫째 성결하고 다음에 화평하고 관용하고 양순하며 긍휼과 선한 열매가 가득하고 편벽과 거짓이 없나니 화평케 하는 자들은 화평으로 심어 의의 열매를 거두느니라"},{topic:"[성결에 대하여]", ref:"(히 12:6)", content:"주께서 그 사랑하시는 자를 징계하시고 그의 받으시는 아들마다 채찍질하심이니라 하였으니"}],
        12: [{topic:"[성결에 대하여]", ref:"(딤후 2:20-21)", content:"큰 집에는 금과 은의 그릇이 있을뿐 아니요 나무와 질그릇도 있어 귀히 쓰는 것도 있고 천히 쓰는 것도 있나니 그러므로 누구든지 이런 것에서 자기를 깨끗하게 하면 귀히 쓰는 그릇이 되어 거룩하고 주인의 쓰심에 합당하며 모든 선한 일에 예비함이 되리라"},{topic:"[기도에 대하여]", ref:"(시 51:17)", content:"하나님의 구하시는 제사는 상한 심령이라 하나님이여 상하고 통회하는 마음을 주께서 멸시치 아니하시리이다"},{topic:"[기도에 대하여]", ref:"(시 145:18)", content:"여호와께서는 자기에게 간구하는 모든 자 곧 진실하게 간구하는 모든 자에게 가까이 하시는도다"},{topic:"[기도에 대하여]", ref:"(렘 29:12-13)", content:"너희는 내게 부르짖으며 와서 내게 기도하면 너희를 들을 것이요 너희가 전심으로 나를 찾고 찾으면 나를 만나리라"}],
        13: [{topic:"[기도에 대하여]", ref:"(렘 33:3)", content:"너는 내게 부르짖으라 내가 네게 응답하겠고 네가 알지 못하는 크고 비밀한 일을 네게 보이리라"},{topic:"[기도에 대하여]", ref:"(마 6:33)", content:"너희는 먼저 그의 나라와 그의 의를 구하라 그리하면 이 모든 것을 너희에게 더하시리라"},{topic:"[기도에 대하여]", ref:"(요 15:7)", content:"너희가 내 안에 거하고 내 말이 너희 안에 거하면 무엇이든지 원하는대로 구하라 그리하면 이루리라"},{topic:"[기도에 대하여]", ref:"(롬 8:26-27)", content:"이와 같이 성령도 우리 연약함을 도우시나니 우리가 마땅히 빌바를 알지 못하나 오직 성령이 말할 수 없는 탄식으로 우리를 위하여 친히 간구하시느니라 마음을 감찰하시는 이가 성령의 생각을 아시나니 이는 성령이 하나님의 뜻대로 성도를 위하여 간구하심이니라"},{topic:"[기도에 대하여]", ref:"(빌 4:6-7)", content:"아무 것도 염려하지 말고 오직 모든 일에 기도와 간구로, 너희 구할 것을 감사함으로 하나님께 아뢰라 그리하면 모든 지각에 뛰어난 하나님의 평강이 그리스도 예수 안에서 너희 마음과 생각을 지키시리라"}]
    };

    let currentList = [];
    let currentIndex = -1;
    let currentItem = {};
    let isRefMode = false;
    let playOrder = 'sequential'; 
    let wrongItemsRecord = []; 
    let isCorrectState = false; 

    window.addEventListener('popstate', function() { goBackLogic(); });

    function startQuiz() {
        const month = parseInt(document.getElementById('month-select').value);
        playOrder = document.getElementById('order-select').value;
        currentList = [...bibleData[month]];
        let nextMonth = month + 1;
        if (nextMonth > 13) nextMonth = 1; 
        currentList.push(...bibleData[nextMonth]);
        
        wrongItemsRecord = currentList.map(item => ({ ...item, wrongCount: 0 }));

        document.getElementById('title-text').innerText = `${month}월 암송 대회 (범위: ${month}월+익월)`;
        history.pushState({page: "quiz"}, "Quiz");
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('stats-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        currentIndex = -1;
        nextQuestion();
    }

    function showBook() {
        const listDiv = document.getElementById('book-list');
        listDiv.innerHTML = "";
        for(let m=1; m<=13; m++) {
            const title = m === 13 ? "2027년 1월" : m + "월";
            listDiv.innerHTML += `<div class="book-month-title">${title}</div>`;
            bibleData[m].forEach(v => {
                listDiv.innerHTML += `<div class="book-item"><span class="topic-badge">${v.topic}</span><br><b>${v.ref}</b> ${v.content}</div>`;
            });
        }
        history.pushState({page: "book"}, "Book");
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('book-screen').classList.remove('hidden');
    }

    function goBackManually() { history.back(); }

    function goBackLogic() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('stats-screen').classList.add('hidden');
        document.getElementById('book-screen').classList.add('hidden');
        document.getElementById('setup-screen').classList.remove('hidden');
        document.getElementById('result').innerHTML = "";
    }

    function loadCurrentQuestion() {
        if (currentIndex >= currentList.length) {
            showCycleStats();
            return;
        }
        isCorrectState = false; 
        currentItem = currentList[currentIndex];
        const mode = document.getElementById('mode-select').value;
        if (mode === 'mix') isRefMode = Math.random() > 0.5;
        else isRefMode = (mode === 'ref');
        
        document.getElementById('topic-label').innerText = "주제: " + currentItem.topic;
        document.getElementById('question-text').innerText = isRefMode ? currentItem.content : currentItem.ref;
        
        // 입력창 비우기 및 오타 수정
        document.getElementById('userInput').value = "";
        document.getElementById('result').innerHTML = "";
        document.getElementById('progress-text').innerText = `${currentIndex + 1} / ${currentList.length}`;
        
        setTimeout(() => {
            document.getElementById('userInput').focus();
        }, 10);
    }

    function nextQuestion() {
        currentIndex++;
        if (currentIndex >= currentList.length) {
            showCycleStats();
            return;
        }
        loadCurrentQuestion();
    }

    function prevQuestion() {
        currentIndex--;
        if (currentIndex < 0) currentIndex = 0;
        loadCurrentQuestion();
    }

    function cleanText(text) { return text.replace(/[\s,]/g, ""); }

    function checkAnswer() {
        const userIn = document.getElementById('userInput').value;
        const target = isRefMode ? currentItem.ref : currentItem.content;
        
        if (cleanText(userIn) === cleanText(target)) {
            isCorrectState = true; 
            document.getElementById('result').innerHTML = "<div style='color:green; font-weight:bold; font-size:1.2em; text-align:center;'>✨ 정답입니다! (엔터를 누르면 다음으로 넘어갑니다)</div>";
            document.getElementById('userInput').blur(); // 모바일 키보드 숨김
        } else {
            isCorrectState = false;
            const record = wrongItemsRecord.find(r => r.ref === currentItem.ref && r.content === currentItem.content);
            if (record) record.wrongCount++;

            let diffHtml = "<div class='diff-view'>";
            let uCleanArr = cleanText(userIn).split("");
            let uIdx = 0;
            const targetArr = target.split("");
            for (let i = 0; i < targetArr.length; i++) {
                const char = targetArr[i];
                if (" , \n".includes(char)) { diffHtml += char === "\n" ? "<br>" : char; continue; }
                if (uIdx < uCleanArr.length && uCleanArr[uIdx] === char) { diffHtml += char; } 
                else { diffHtml += `<span class='wrong-char'>${char}</span>`; }
                uIdx++;
            }
            diffHtml += "</div>";
            document.getElementById('result').innerHTML = "<div style='color:#d93025; font-weight:bold; margin-bottom:5px;'>❌ 틀린 부분을 확인하세요 (빨간 밑줄):</div>" + diffHtml;
            document.getElementById('userInput').focus();
        }
    }

    function showCycleStats() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('stats-screen').classList.remove('hidden');
        history.pushState({page: "stats"}, "Stats");

        const chartArea = document.getElementById('chart-area');
        const wrongListArea = document.getElementById('wrong-list-area');
        chartArea.innerHTML = "";
        wrongListArea.innerHTML = "";

        const maxWrong = Math.max(...wrongItemsRecord.map(r => r.wrongCount), 1);
        let totalWrongTypes = 0;

        wrongItemsRecord.forEach(item => {
            const percentage = (item.wrongCount / maxWrong) * 100;
            chartArea.innerHTML += `
                <div class="bar-chart-row">
                    <div class="bar-label" title="${item.ref}">${item.ref}</div>
                    <div class="bar-track"><div class="bar-fill" style="width: ${percentage}%"></div></div>
                    <div class="bar-text">${item.wrongCount}회</div>
                </div>
            `;

            if (item.wrongCount > 0) {
                totalWrongTypes++;
                wrongListArea.innerHTML += `
                    <div class="wrong-review-item">
                        <span class="topic-badge">${item.topic}</span> <b>${item.ref}</b> 틀림 (${item.wrongCount}회)<br>
                        <span style="font-size: 14px; color: #555;">${item.content}</span>
                    </div>
                `;
            }
        });

        if (totalWrongTypes === 0) {
            wrongListArea.innerHTML = "<p style='color: #34a853; font-weight: bold;'>🎉 틀린 구절이 하나도 없습니다! 완벽합니다!</p>";
            document.getElementById('retry-wrong-btn').style.display = 'none';
        } else {
            document.getElementById('retry-wrong-btn').style.display = 'block';
        }
    }

    function startWrongRetry() {
        currentList = wrongItemsRecord.filter(item => item.wrongCount > 0);
        if (playOrder === 'random') {
            currentList.sort(() => Math.random() - 0.5);
        }
        wrongItemsRecord = currentList.map(item => ({ ...item, wrongCount: 0 }));
        
        document.getElementById('title-text').innerText = `🔄 오답 재시험 (${currentList.length}개 구절)`;
        document.getElementById('stats-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        currentIndex = -1;
        nextQuestion();
    }

    // [핵심 변경] 전체 문서(document) 기준으로 엔터키 이벤트 감지
    document.addEventListener('keydown', function(e) {
        const quizScreen = document.getElementById('quiz-screen');
        if (!quizScreen.classList.contains('hidden')) {
            // 정답을 맞춘 상태에서 엔터를 누르면 포커스 유무와 상관없이 다음으로 넘어감
            if (e.key === 'Enter' && !e.shiftKey && isCorrectState) {
                e.preventDefault();
                nextQuestion();
            } else if (e.key === 'F2') {
                e.preventDefault();
                nextQuestion();
            } else if (e.key === 'F1') {
                e.preventDefault();
                prevQuestion();
            }
        }
    });

    // 텍스트 영역(userInput) 안에서 아직 정답을 안 맞힌 상태일 때만 정답 확인
    document.getElementById('userInput').addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey && !isCorrectState) {
            // 데스크탑 환경에서만 엔터로 정답 확인 (모바일은 줄바꿈 허용)
            if (window.innerWidth > 768) { 
                e.preventDefault(); 
                checkAnswer(); 
            }
        }
    });
</script>
</body>
</html>
